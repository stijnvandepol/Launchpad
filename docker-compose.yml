services:
  launchpad:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - demos:/demos
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/cloudflared:/etc/cloudflared


volumes:
  demos:
