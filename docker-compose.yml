services:
  launchpad:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    volumes:
      - demos:/demos
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/cloudflared:/cloudflared
    depends_on:
      - tunnel-launchpad

  tunnel-launchpad:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}

  tunnel-projects:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --config /etc/cloudflared/config.yaml run
    volumes:
      - /etc/cloudflared:/etc/cloudflared:ro

volumes:
  demos:
