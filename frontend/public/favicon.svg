<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fortnite Launchpad -->
  <!-- Outer glow ring -->
  <ellipse cx="32" cy="46" rx="28" ry="6" fill="#00d4ff" opacity="0.3"/>
  <!-- Platform base shadow -->
  <ellipse cx="32" cy="46" rx="22" ry="4" fill="#005f8a"/>
  <!-- Platform top surface -->
  <ellipse cx="32" cy="42" rx="22" ry="5" fill="#00b8e6"/>
  <!-- Platform rim highlight -->
  <ellipse cx="32" cy="42" rx="22" ry="5" fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.8"/>
  <!-- Platform inner surface -->
  <ellipse cx="32" cy="41" rx="18" ry="4" fill="#0090c0"/>
  <!-- Hexagon grid pattern on surface -->
  <ellipse cx="32" cy="41" rx="18" ry="4" fill="url(#hex)" opacity="0.4"/>
  <!-- Center glowing core -->
  <ellipse cx="32" cy="40" rx="7" ry="2.5" fill="#00ffff" opacity="0.9"/>
  <ellipse cx="32" cy="40" rx="4" ry="1.5" fill="white" opacity="0.8"/>
  <!-- Energy beam going up -->
  <line x1="32" y1="38" x2="32" y2="10" stroke="#00ffff" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="32" y2="10" stroke="white" stroke-width="0.8" opacity="0.8" stroke-linecap="round"/>
  <!-- Arrow/chevron pointing up (launch indicator) -->
  <polyline points="26,26 32,18 38,26" fill="none" stroke="#00ffff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="26,32 32,24 38,32" fill="none" stroke="#00eeff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>
  <!-- Side legs/supports -->
  <line x1="14" y1="46" x2="20" y2="42" stroke="#0070a0" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="46" x2="44" y2="42" stroke="#0070a0" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="50" x2="14" y2="46" stroke="#005070" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="50" x2="50" y2="46" stroke="#005070" stroke-width="2.5" stroke-linecap="round"/>
  <defs>
    <pattern id="hex" patternUnits="userSpaceOnUse" width="8" height="8">
      <polygon points="4,1 7,2.5 7,5.5 4,7 1,5.5 1,2.5" fill="none" stroke="#00ffff" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>
